<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Manager</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Encabezado ────────────────────────── -->
  <header>
    <h1>📦 Product Manager</h1>
    <p>Sistema de gestión de productos</p>
  </header>

  <main>

    <!-- ── Formulario crear/editar ───────────── -->
    <section class="form-section">
      <h2 id="form-title">➕ Nuevo Producto</h2>

      <div class="form-grid">

        <!-- Campo oculto que guarda el ID cuando editamos -->
        <input type="hidden" id="product-id">

        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" placeholder="Ej: Laptop HP 15" required>
        </div>

        <div class="form-group">
          <label for="price">Precio (Q)</label>
          <input type="number" id="price" placeholder="Ej: 1299.99" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="stock">Stock</label>
          <input type="number" id="stock" placeholder="Ej: 10" required>
        </div>

        <div class="form-group full-width">
          <label for="description">Descripción</label>
          <textarea id="description" placeholder="Describe el producto..." rows="3" required></textarea>
        </div>

        <div class="form-actions full-width">
          <button id="btn-save" onclick="saveProduct()">💾 Guardar Producto</button>
          <button id="btn-cancel" class="btn-secondary" onclick="cancelEdit()" style="display:none">✖ Cancelar</button>
        </div>

      </div>
    </section>

    <!-- ── Mensaje de notificación ───────────── -->
    <div id="alert" class="alert" style="display:none"></div>

    <!-- ── Tabla de productos ─────────────────── -->
    <section class="table-section">
      <div class="table-header">
        <h2>📋 Productos registrados</h2>
        <button onclick="loadProducts()" class="btn-refresh">🔄 Actualizar</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <!-- Los productos se insertan aquí dinámicamente con JS -->
          <tbody id="products-table">
            <tr>
              <td colspan="6" class="loading">Cargando productos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Cargamos el JS al final para que el HTML ya esté listo -->
  <script src="js/app.js"></script>

</body>
</html>
